<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autosuggest</title>
    <link rel="stylesheet" href="../css/ausu.css">
</head>
<body>
     <span class="gear" > &#x2699;</span> 
     <!--the pointer doesnt move to another line so that we can comfortably apply any styling -->
    <div class="pill">
        <span class="bullet">&#x2022;</span>
        <span>online | &#x23F0; -ms</span>
    </div>  
    <div class="main-content">
        <h1><span class="bing">Being</span><span>Infinity</span></h1>
        <p class="tagline">one million phrases. for algorithms. prfix based autosuggest</p>
        <div class="searchbar">
            <span class="lens">&#x1F50D;</span>
            <input class="searcher" type="text" placeholder="start texting to search">
            <div id="search-suggestions"></div>
        </div>
    </div>
</body>
</html>
